enum TaskStatus {
    PENDING
    IN_PROGRESS
    BLOCKED
    DONE
    FAILED
}

enum LearningCategory {
    FRICTION
    SURPRISE
    METHODOLOGY
    PROCESS_GAP
}

type PhaseLearning {
    id: OID!
    category: LearningCategory!
    description: String!
}

type PhaseHandoff {
    id: OID!
    phase: String!
    workDone: String!
    filesModified: [String!]!
    learnings: [PhaseLearning!]!
    completedAt: DateTime!
    completedBy: String
}

type PipelineTask {
    id: OID!
    taskType: String!
    status: TaskStatus!
    target: String!
    batchId: String
    documentRef: String
    currentPhase: String
    completedPhases: [String!]!
    handoffs: [PhaseHandoff!]!
    assignedTo: String
    createdAt: DateTime!
    updatedAt: DateTime
}

type PhaseOrderEntry {
    taskType: String!
    phases: [String!]!
}

type PipelineQueueState {
    schemaVersion: Int!
    phaseOrder: [PhaseOrderEntry!]!
    tasks: [PipelineTask!]!
    completedCount: Int!
    activeCount: Int!
    lastProcessedAt: DateTime
}

# queue-management

input AddTaskInput {
    id: OID!
    taskType: String!
    target: String!
    batchId: String
    documentRef: String
    currentPhase: String
    createdAt: DateTime!
}

input AssignTaskInput {
    taskId: OID!
    assignedTo: String!
    updatedAt: DateTime!
}

input PhaseHandoffInput {
    id: OID!
    phase: String!
    workDone: String!
    filesModified: [String!]!
    completedAt: DateTime!
    completedBy: String
}

input AdvancePhaseInput {
    taskId: OID!
    handoff: PhaseHandoffInput!
    updatedAt: DateTime!
}

input CompleteTaskInput {
    taskId: OID!
    updatedAt: DateTime!
}

input FailTaskInput {
    taskId: OID!
    reason: String!
    updatedAt: DateTime!
}

input BlockTaskInput {
    taskId: OID!
    reason: String!
    updatedAt: DateTime!
}

input UnblockTaskInput {
    taskId: OID!
    updatedAt: DateTime!
}