type KnowledgeGraphState {
    nodes: [GraphNode!]!
    edges: [GraphEdge!]!
    lastSyncedAt: DateTime
}

type GraphNode {
    id: OID!
    documentId: String!
    title: String
    noteType: String
    status: String
}

type GraphEdge {
    id: OID!
    sourceDocumentId: String!
    targetDocumentId: String!
    linkType: String
}

# nodes

input AddNodeInput {
    id: OID!
    documentId: String!
    title: String
    noteType: String
    status: String
}

input RemoveNodeInput {
    documentId: String!
}

input UpdateNodeInput {
    documentId: String!
    title: String
    noteType: String
    status: String
}

# edges

input AddEdgeInput {
    id: OID!
    sourceDocumentId: String!
    targetDocumentId: String!
    linkType: String
}

input RemoveEdgeInput {
    id: OID!
}

input UpdateEdgeInput {
    id: OID!
    linkType: String
}

# sync

input GraphNodeInput {
    id: OID!
    documentId: String!
    title: String
    noteType: String
    status: String
}

input GraphEdgeInput {
    id: OID!
    sourceDocumentId: String!
    targetDocumentId: String!
    linkType: String
}

input SyncGraphInput {
    nodes: [GraphNodeInput!]!
    edges: [GraphEdgeInput!]!
    syncedAt: DateTime!
}