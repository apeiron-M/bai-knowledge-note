type DerivationSignal {
    id: OID!
    utterance: String!
    influencedDimensions: [String!]!
    interpretation: String!
}

type DimensionRationale {
    dimension: String!
    position: Int!
    confidence: Float!
    rationale: String!
    supportingClaims: [String!]!
    failureModes: [String!]!
}

type ClaimReference {
    id: OID!
    claimRef: String!
    supportsDecision: String!
    strength: String!
}

type FeatureDecision {
    feature: String!
    enabled: Boolean!
    rationale: String!
    supportingClaims: [String!]!
}

type CoherenceCheck {
    dimensionPair: [String!]!
    coherent: Boolean!
    explanation: String!
}

type ReseedEntry {
    id: OID!
    reseededAt: DateTime!
    reason: String!
    changes: [String!]!
}

type DerivationState {
    engineVersion: String
    derivedAt: DateTime
    signals: [DerivationSignal!]!
    dimensionRationale: [DimensionRationale!]!
    claimReferences: [ClaimReference!]!
    featureDecisions: [FeatureDecision!]!
    coherenceResults: [CoherenceCheck!]!
    reseedHistory: [ReseedEntry!]!
}

# derivation-management

input InitializeDerivationInput {
    engineVersion: String!
    derivedAt: DateTime!
}

input AddSignalInput {
    id: OID!
    utterance: String!
    influencedDimensions: [String!]!
    interpretation: String!
}

input AddReseedEntryInput {
    id: OID!
    reseededAt: DateTime!
    reason: String!
    changes: [String!]!
}

input UpdateDimensionRationaleInput {
    dimension: String!
    position: Int!
    confidence: Float!
    rationale: String!
    supportingClaims: [String!]!
    failureModes: [String!]!
}