enum ObservationCategory {
    METHODOLOGY
    PROCESS
    FRICTION
    SURPRISE
    QUALITY
}

enum ObservationStatus {
    PENDING
    PROMOTED
    IMPLEMENTED
    ARCHIVED
}

type ObservationState {
    title: String
    description: String
    content: String
    category: ObservationCategory
    status: ObservationStatus
    observedAt: DateTime
    observedBy: String
    promotedTo: String
    promotedAt: DateTime
}

# observation-management

input CreateObservationInput {
    title: String!
    description: String!
    content: String
    category: ObservationCategory!
    observedAt: DateTime!
    observedBy: String
}

input PromoteObservationInput {
    promotedTo: String!
    promotedAt: DateTime!
}

input ImplementObservationInput {
    updatedAt: DateTime!
}

input ArchiveObservationInput {
    updatedAt: DateTime!
}