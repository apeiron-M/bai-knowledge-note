enum TensionStatus {
    OPEN
    RESOLVED
    DISSOLVED
}

type TensionState {
    title: String
    description: String
    content: String
    involvedRefs: [String!]!
    status: TensionStatus
    observedAt: DateTime
    observedBy: String
    resolution: String
    resolvedAt: DateTime
}

# tension-management

input CreateTensionInput {
    title: String!
    description: String!
    content: String
    involvedRefs: [String!]!
    observedAt: DateTime!
    observedBy: String
}

input ResolveTensionInput {
    resolution: String!
    resolvedAt: DateTime!
}

input DissolveTensionInput {
    resolution: String!
    resolvedAt: DateTime!
}

input AddInvolvedRefInput {
    ref: String!
}